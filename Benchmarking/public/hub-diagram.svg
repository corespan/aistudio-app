<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>AI Studio integration hub diagram</title>
  <desc>A glowing central AI Studio hub connected by animated flowing lines to six surrounding service nodes: Kubernetes, RabbitMQ, PostgreSQL, FastAPI, Celery, and Prometheus, set against a dark hexagonal grid backdrop.</desc>

  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hubFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="55%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <pattern id="hexGrid" width="42" height="72.7" patternUnits="userSpaceOnUse" patternTransform="translate(450,300)">
      <path d="M21 0 L42 12.1 L42 36.4 L21 48.5 L0 36.4 L0 12.1 Z" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
      <path d="M21 48.5 L42 60.6 L42 84.8" fill="none" stroke="#ffffff" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="url(#hexGrid)"/>
  <rect x="0" y="0" width="900" height="600" fill="url(#bgGlow)"/>

  <!-- orbit rings around the hub -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.14">
    <circle cx="450" cy="300" r="120"/>
    <circle cx="450" cy="300" r="168"/>
  </g>

  <!-- connector lines with flowing dash animation -->
  <g fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round">
    <path d="M450,300 C378,238 296,206 184,164" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M450,300 C522,238 604,206 716,164" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="2.8s" repeatCount="indefinite"/>
    </path>
    <path d="M450,300 C366,300 264,300 156,300" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="2.0s" repeatCount="indefinite"/>
    </path>
    <path d="M450,300 C534,300 636,300 744,300" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M450,300 C378,362 296,394 184,436" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="2.6s" repeatCount="indefinite"/>
    </path>
    <path d="M450,300 C522,362 604,394 716,436" stroke-dasharray="6 8">
      <animate attributeName="stroke-dashoffset" from="140" to="0" dur="3.0s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- glowing pulse dots traveling each connector -->
  <g fill="#e0f7fa">
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="2.4s" repeatCount="indefinite" path="M450,300 C378,238 296,206 184,164"/></circle>
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="2.8s" repeatCount="indefinite" path="M450,300 C522,238 604,206 716,164"/></circle>
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="2.0s" repeatCount="indefinite" path="M450,300 C366,300 264,300 156,300"/></circle>
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="2.2s" repeatCount="indefinite" path="M450,300 C534,300 636,300 744,300"/></circle>
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="2.6s" repeatCount="indefinite" path="M450,300 C378,362 296,394 184,436"/></circle>
    <circle r="4.5" filter="url(#softBlur)"><animateMotion dur="3.0s" repeatCount="indefinite" path="M450,300 C522,362 604,394 716,436"/></circle>
  </g>

  <!-- ambient floating particles -->
  <g fill="#22d3ee" fill-opacity="0.5">
    <circle cx="120" cy="90" r="2.5"><animate attributeName="cy" values="90;70;90" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="520" r="2" ><animate attributeName="cy" values="520;500;520" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="480" r="2.2"><animate attributeName="cy" values="480;460;480" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="110" r="2.3"><animate attributeName="cy" values="110;92;110" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="60" r="2"><animate attributeName="cy" values="60;44;60" dur="3.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- central hub: pulsing halo + hexagon core -->
  <circle cx="450" cy="300" r="86" fill="#22d3ee" fill-opacity="0.16" filter="url(#strongBlur)">
    <animate attributeName="r" values="80;96;80" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <g filter="url(#softBlur)">
    <polygon points="450,240 494,266 494,318 450,344 406,318 406,266" fill="url(#hubFill)"/>
    <path d="M424,300 L466,300 L448,258 L494,300 L452,300 L470,342 Z" fill="#0b0d12"/>
  </g>
  <text x="450" y="384" text-anchor="middle" font-size="21" font-weight="700" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">AI Studio</text>
  <text x="450" y="408" text-anchor="middle" font-size="13" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Benchmark Engine</text>

  <!-- node card template: glass panel, glow ring, icon, 2-line label -->
  <!-- Kubernetes -->
  <g>
    <rect x="130" y="108" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#6366f1" stroke-opacity="0.45"/>
    <rect x="130" y="108" width="108" height="108" rx="22" fill="none" stroke="#6366f1" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(184,158)" stroke="#818cf8" stroke-width="3" fill="none">
      <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11"/>
      <circle r="6" fill="#818cf8" stroke="none"/>
    </g>
    <text x="184" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Kubernetes</text>
    <text x="184" y="254" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Orchestration</text>
  </g>

  <!-- RabbitMQ -->
  <g>
    <rect x="662" y="108" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#f97316" stroke-opacity="0.45"/>
    <rect x="662" y="108" width="108" height="108" rx="22" fill="none" stroke="#f97316" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(716,158)" fill="#fb923c">
      <rect x="-4" y="-20" width="8" height="18" rx="2"/>
      <rect x="-16" y="-12" width="8" height="26" rx="2"/>
      <rect x="8" y="-12" width="8" height="26" rx="2"/>
      <rect x="-18" y="14" width="36" height="8" rx="2"/>
    </g>
    <text x="716" y="236" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">RabbitMQ</text>
    <text x="716" y="254" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Task Queue</text>
  </g>

  <!-- PostgreSQL -->
  <g>
    <rect x="48" y="246" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#38bdf8" stroke-opacity="0.45"/>
    <rect x="48" y="246" width="108" height="108" rx="22" fill="none" stroke="#38bdf8" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(102,300)" fill="none" stroke="#67e8f9" stroke-width="3">
      <ellipse cx="0" cy="-14" rx="20" ry="8"/>
      <path d="M-20,-14 L-20,10 A20,8 0 0 0 20,10 L20,-14"/>
      <path d="M-20,-2 A20,8 0 0 0 20,-2" stroke-opacity="0.6"/>
    </g>
    <text x="102" y="378" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">PostgreSQL</text>
    <text x="102" y="396" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Results Store</text>
  </g>

  <!-- FastAPI -->
  <g>
    <rect x="744" y="246" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#34d399" stroke-opacity="0.45"/>
    <rect x="744" y="246" width="108" height="108" rx="22" fill="none" stroke="#34d399" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(798,300)" fill="none" stroke="#6ee7b7" stroke-width="3">
      <circle r="22"/>
      <path d="M4,-14 L-10,4 L2,4 L-4,16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="798" y="378" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">FastAPI</text>
    <text x="798" y="396" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">API Layer</text>
  </g>

  <!-- Celery -->
  <g>
    <rect x="130" y="384" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#22c55e" stroke-opacity="0.45"/>
    <rect x="130" y="384" width="108" height="108" rx="22" fill="none" stroke="#22c55e" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(184,438)" fill="none" stroke="#4ade80" stroke-width="3">
      <circle r="20"/>
      <path d="M-8,-6 A9,9 0 1 0 -8,10" stroke-linecap="round"/>
    </g>
    <text x="184" y="516" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Celery</text>
    <text x="184" y="534" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Workers</text>
  </g>

  <!-- Prometheus -->
  <g>
    <rect x="662" y="384" width="108" height="108" rx="22" fill="#171a21" fill-opacity="0.9" stroke="#f97316" stroke-opacity="0.45"/>
    <rect x="662" y="384" width="108" height="108" rx="22" fill="none" stroke="#f97316" stroke-opacity="0.25" stroke-width="6" filter="url(#softBlur)"/>
    <g transform="translate(716,438)" fill="#fb923c">
      <path d="M0,-22 C13,-22 22,-11 22,0 C22,10 16,17 10,20 L10,26 L-10,26 L-10,20 C-16,17 -22,10 -22,0 C-22,-11 -13,-22 0,-22 Z"/>
      <rect x="-10" y="24" width="20" height="6" fill="#0b0d12"/>
    </g>
    <text x="716" y="516" text-anchor="middle" font-size="14" font-weight="600" fill="#f8fafc" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Prometheus</text>
    <text x="716" y="534" text-anchor="middle" font-size="11" fill="#9aa1ac" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif">Metrics</text>
  </g>
</svg>
